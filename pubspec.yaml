name: personality_quiz_app
description: PersonaSphere – Discover Your True Self. Offline personality quizzes with shareable results.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  share_plus: ^11.0.0
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/branding/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#0B1020"
    theme_color: "#0B1020"
  windows:
    generate: true
    image_path: assets/branding/app_icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0B1020"
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_foreground_inset: 24
  remove_alpha_ios: true
